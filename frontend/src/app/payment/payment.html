<div class="payment-container">
  <div class="payment-card">
    <div class="payment-header">
      <h1>Secure Payment</h1>
      <p>Support Sankofa Alkebulan with your contribution</p>
    </div>

    <form class="payment-form" (ngSubmit)="onSubmit()">
      <!-- Payment Method Selection -->
      <div class="form-section">
        <h3>Payment Method</h3>
        <div class="payment-methods">
          <label class="payment-method-option">
            <input
              type="radio"
              name="paymentMethod"
              value="card"
              [checked]="paymentData().paymentMethod === 'card'"
              (change)="updatePaymentMethod('card')"
            />
            <span class="method-label">
              <i class="icon-card"></i>
              Credit/Debit Card
            </span>
          </label>

          <label class="payment-method-option">
            <input
              type="radio"
              name="paymentMethod"
              value="mobile_money"
              [checked]="paymentData().paymentMethod === 'mobile_money'"
              (change)="updatePaymentMethod('mobile_money')"
            />
            <span class="method-label">
              <i class="icon-mobile"></i>
              Mobile Money
            </span>
          </label>
        </div>
      </div>

      <!-- Amount and Basic Info -->
      <div class="form-section">
        <div class="form-row">
          <div class="form-group">
            <label for="amount">Amount (USD)</label>
            <input
              type="number"
              id="amount"
              [(ngModel)]="paymentData().amount"
              name="amount"
              placeholder="0.00"
              min="1"
              step="0.01"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              [(ngModel)]="paymentData().email"
              name="email"
              placeholder="your@email.com"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="description">Description (Optional)</label>
          <input
            type="text"
            id="description"
            [(ngModel)]="paymentData().description"
            name="description"
            placeholder="What is this payment for?"
          />
        </div>
      </div>

      <!-- Card Payment Fields -->
      <div class="form-section" *ngIf="paymentData().paymentMethod === 'card'">
        <h3>Card Details</h3>

        <div class="form-group">
          <label for="cardholderName">Cardholder Name</label>
          <input
            type="text"
            id="cardholderName"
            [(ngModel)]="paymentData().cardholderName"
            name="cardholderName"
            placeholder="John Doe"
            required
          />
        </div>

        <div class="form-group">
          <label for="cardNumber">Card Number</label>
          <input
            type="text"
            id="cardNumber"
            [ngModel]="paymentData().cardNumber"
            (input)="formatCardNumber($event)"
            name="cardNumber"
            placeholder="1234 5678 9012 3456"
            maxlength="19"
            required
          />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="expiryMonth">Expiry Month</label>
            <select
              id="expiryMonth"
              [(ngModel)]="paymentData().expiryMonth"
              name="expiryMonth"
              required
            >
              <option value="">Month</option>
              <option
                *ngFor="
                  let month of [
                    '01',
                    '02',
                    '03',
                    '04',
                    '05',
                    '06',
                    '07',
                    '08',
                    '09',
                    '10',
                    '11',
                    '12'
                  ]
                "
                [value]="month"
              >
                {{ month }}
              </option>
            </select>
          </div>

          <div class="form-group">
            <label for="expiryYear">Expiry Year</label>
            <select
              id="expiryYear"
              [(ngModel)]="paymentData().expiryYear"
              name="expiryYear"
              required
            >
              <option value="">Year</option>
              <option
                *ngFor="
                  let year of ['2025', '2026', '2027', '2028', '2029', '2030', '2031', '2032']
                "
                [value]="year"
              >
                {{ year }}
              </option>
            </select>
          </div>

          <div class="form-group">
            <label for="cvv">CVV</label>
            <input
              type="text"
              id="cvv"
              [(ngModel)]="paymentData().cvv"
              name="cvv"
              placeholder="123"
              maxlength="4"
              required
            />
          </div>
        </div>
      </div>

      <!-- Mobile Money Fields -->
      <div class="form-section" *ngIf="paymentData().paymentMethod === 'mobile_money'">
        <h3>Mobile Money Details</h3>

        <div class="form-group">
          <label for="mobileProvider">Mobile Money Provider</label>
          <select
            id="mobileProvider"
            [(ngModel)]="paymentData().mobileProvider"
            name="mobileProvider"
            required
          >
            <option value="">Select Provider</option>
            <option *ngFor="let provider of mobileProviders" [value]="provider.value">
              {{ provider.label }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label for="phoneNumber">Phone Number</label>
          <input
            type="tel"
            id="phoneNumber"
            [(ngModel)]="paymentData().phoneNumber"
            name="phoneNumber"
            placeholder="+233 XX XXX XXXX"
            required
          />
          <small class="form-help">Enter your mobile money registered number</small>
        </div>
      </div>

      <!-- Error/Success Messages -->
      <div class="messages">
        <div class="error-message" *ngIf="error()">
          {{ error() }}
        </div>
        <div class="success-message" *ngIf="success()">
          {{ success() }}
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="payment-btn" [disabled]="isLoading()">
        {{ isLoading() ? 'Processing...' : 'Complete Payment' }}
      </button>
    </form>

    <!-- Security Notice -->
    <div class="security-notice">
      <i class="icon-lock"></i>
      <span>Your payment information is secure and encrypted</span>
    </div>
  </div>

  <!-- African Pattern Background -->
  <div class="pattern-overlay">
    <svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern
          id="paymentPattern"
          x="0"
          y="0"
          width="25"
          height="25"
          patternUnits="userSpaceOnUse"
        >
          <circle
            cx="12.5"
            cy="12.5"
            r="8"
            fill="none"
            stroke="#2c3e50"
            stroke-width="1"
            opacity="0.1"
          />
          <path
            d="M12.5,4.5 L12.5,20.5 M4.5,12.5 L20.5,12.5"
            stroke="#2c3e50"
            stroke-width="1"
            opacity="0.1"
          />
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#paymentPattern)" />
    </svg>
  </div>
</div>
